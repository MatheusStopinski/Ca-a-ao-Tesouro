<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa da Jornada</title>

    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>

    <div class="mapa-container">

        <img src="src/img/mapa.png" alt="Mapa" class="mapa">

        <div class="botoes-mapa">

            <button class="botao-voltar" onclick="voltar()">
                ← Voltar
            </button>

            <button class="botao-continuar" onclick="continuarJornada()">
                Continuar a Jornada →
            </button>

        </div>

    </div>

    <script src="src/js/script.js"></script>

</body>

</html>
