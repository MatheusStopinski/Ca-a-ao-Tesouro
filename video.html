<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Transição</title>

    <style>

        body {

            margin: 0;

            background: black;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

        }

        video {

            width: 100%;

            height: 100%;

            object-fit: contain;

        }

    </style>

</head>

<body>

    <video id="video"
           autoplay
           playsinline>

        <source src="src/videos/transicao.mp4"
                type="video/mp4">

    </video>

    <script>

        const video = document.getElementById("video");

        video.addEventListener("ended", () => {

            window.location.href = "tela7.html";

        });

    </script>

</body>

</html>
